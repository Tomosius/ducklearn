name: ducklearn
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - mypy
  - pyright
  - pre-commit
  - sqlglot
  - commitizen
  - pytest
  - ruff
  - pylint=4.0.4
  - pydocstyle
  - vulture
  - docformatter
  - pyroma
  - interrogate
  - pytest-cov
  - hypothesis
  - pytest-mock
  - typeguard
  - mutmut
  - psutil
  - pip
  - requests
prefix: /opt/homebrew/Caskroom/miniconda/base/envs/ducklearn
