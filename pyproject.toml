[project]
name = "ducklearn"
version = "0.0.1"
description = "DuckDB based extension for Scikit Learn ML Ecosystem"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }

authors = [
    { name = "Tomas Pecukevicius" }
]

urls = { "Homepage" = "https://github.com/Tomosius/ducklearn", "Repository" = "https://github.com/Tomosius/ducklearn", "Issues" = "https://github.com/Tomosius/ducklearn/issues" }

dependencies = []

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_scheme = "pep440"
version_provider = "pep621"
update_changelog_on_bump = true
major_version_zero = true
changelog_file = "CHANGELOG.md"